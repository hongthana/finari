name: Activity log pruning

on:
  schedule:
    - cron: "15 20 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: activity-log-pruning
  cancel-in-progress: false

jobs:
  prune:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger activity log pruning
        env:
          FINARI_BASE_URL: ${{ vars.FINARI_BASE_URL }}
          ACTIVITY_CRON_SECRET: ${{ secrets.ACTIVITY_CRON_SECRET }}
        run: |
          set -euo pipefail

          if [ -z "${FINARI_BASE_URL:-}" ]; then
            echo "FINARI_BASE_URL is required"
            exit 1
          fi

          if [ -z "${ACTIVITY_CRON_SECRET:-}" ]; then
            echo "ACTIVITY_CRON_SECRET is required"
            exit 1
          fi

          curl --fail --silent --show-error \
            --request POST \
            --url "${FINARI_BASE_URL%/}/api/admin/activity/prune" \
            --header "Authorization: Bearer ${ACTIVITY_CRON_SECRET}"
